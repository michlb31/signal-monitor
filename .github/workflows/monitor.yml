name: FX Signal Monitor

on:
  # Gira ogni 30 minuti automaticamente
  schedule:
    - cron: '*/30 * * * *'
  # Permette anche run manuale da GitHub UI
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # serve per committare i file di stato

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: FX monitor (universo IC Markets — ticket su nuovi segnali)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python fx_monitor.py --alert --quiet
        continue-on-error: true

      - name: XAU specialist (bias flip / MA200 / eventi — anti-spam)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python forex_monitor.py --alert --quiet
        continue-on-error: true

      - name: Commit stato aggiornato
        run: |
          git config user.name  "FX Monitor Bot"
          git config user.email "bot@signal-monitor.local"
          git pull --rebase origin main || true
          git add fx_state.json forex_state.json
          # Committa solo se ci sono cambiamenti reali
          git diff --staged --quiet || git commit -m "chore: update fx state $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
